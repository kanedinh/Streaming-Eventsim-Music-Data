# Packages (present params --packages)
spark.jars.packages             org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1,org.postgresql:postgresql:42.6.0

# Ivy Cache (present params --conf spark.jars.ivy)
spark.jars.ivy                  /tmp/.ivy2

# --- Save eventLog to History Server
spark.eventLog.enabled           true
spark.eventLog.dir               file:///tmp/spark-events
spark.history.fs.logDirectory    file:///tmp/spark-events